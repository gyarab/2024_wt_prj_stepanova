<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-md bg-body-tertiary container-fluid" >
        <div class="container d-flex justify-content-between">
          <a class="navbar-brand" href="{% url 'homepage' %}">
            <img src="https://cdn.iconscout.com/icon/free/png-512/free-recipe-book-icon-download-in-svg-png-gif-file-formats--cookbook-menu-cooking-food-kitchen-books-pack-school-education-icons-3806085.png?f=webp&w=256" alt="Logo" width="40" height="40" class="d-inline-block align-text-top">
            Recipes
          </a>
    
          <form class="d-flex" method="GET" action="{% url 'search' %}">
              <input class="form-control me-2" type="search" name="q" placeholder="Search recipes..." aria-label="Search" value="{{ request.GET.q }}">
              <button class="btn btn-outline-secondary" type="submit">🔍</button>
          </form>
    
          <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav me-auto">
                  <li class="nav-item">
                      <a class="nav-link active" href="{% url 'homepage' %}">Home</a>
                  </li>
      
                  <li class="nav-item dropdown">
                      <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" 
                          aria-expanded="false">
                          Cuisines
                      </a>
                      <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                          <li><a class="dropdown-item" href="{% url 'czech' %}">Czech</a></li>
                          <li><a class="dropdown-item" href="{% url 'italian' %}">Italian</a></li>
                          <li><a class="dropdown-item" href="{% url 'french' %}">French</a></li>
                      </ul>
                  </li>
              </ul>
          </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
            Content will go here
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
