<div class="row mt-3">
    <div class="col-md-6">
        <label for="category-filter" class="form-label">Filter by Category</label>
        <select id="category-filter" class="form-select" onchange="applyFilters()">
            <option value="">All Categories</option>
            {% for category in categories %}
                <option value="{{ category.id }}" {% if selected_category == category.id|stringformat:"s" %}selected{% endif %}>
                    {{ category.name }}
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6">
        <label for="difficulty-filter" class="form-label">Filter by Difficulty</label>
        <select id="difficulty-filter" class="form-select" onchange="applyFilters()">
            <option value="">All Difficulties</option>
            {% for difficulty_value, difficulty_display in difficulty_choices %}
                <option value="{{ difficulty_value }}" {% if selected_difficulty == difficulty_value|stringformat:"s" %}selected{% endif %}>
                    {{ difficulty_display }}
                </option>
            {% endfor %}
        </select>
    </div>
</div>

<script>
function applyFilters() {
    const category = document.getElementById('category-filter').value;
    const difficulty = document.getElementById('difficulty-filter').value;
    
    const url = new URL(window.location);
    
    if (category) {
        url.searchParams.set('category', category);
    } else {
        url.searchParams.delete('category');
    }
    
    if (difficulty) {
        url.searchParams.set('difficulty', difficulty);
    } else {
        url.searchParams.delete('difficulty');
    }
    
    window.location.href = url.toString();
}
</script>
